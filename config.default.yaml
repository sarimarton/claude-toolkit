# Claude Toolkit configuration
#
# All module settings live under `modules.<id>` and are read LIVE at runtime, so
# editing this file takes effect without a reinstall. Binary paths are auto-detected
# (via `which`) at install time and are not configured here.

modules:
  usageMonitor:
    pollIntervalSeconds: 300     # Seconds between /usage polls. Each poll recreates the
                                 # monitor's claude session (the long-lived one freezes its
                                 # "Current session" value after ~1h), so keep this generous.

  usageChart:
    planMonthlyCost: 150         # Your plan's monthly cost in USD
    apiCostPerSessionPct: 0.20   # Estimated API cost per 1% of a 5h session window

  autoDev:
    maxIssuesPerRun: 3           # Max 'ai'-labelled issues advanced per scheduled run
    bailoutPct: 75               # Skip a run if Claude session usage is at or above this %
    # Per-repo autonomy override (default: high). 'high' = opens issues + PRs + pushes
    # commits autonomously; 'low' = opens issues + comments only (no PRs, no pushes).
    # repos:
    #   owner/repo-name:
    #     autonomy: low

# Multi-account usage monitoring (optional)
# Each account gets its own tmux session and JSONL log; 'primary' shows in the menubar title.
# accounts:
#   - name: Alice
#     token: sk-ant-oat01-...
#     primary: true
#   - name: Bob
#     token: sk-ant-oat01-...
