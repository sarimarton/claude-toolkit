# Claude Toolkit configuration
# Paths are auto-detected; override here if needed.

# installDir: ~/.config/claude-toolkit

# paths:
#   tmux: /opt/homebrew/bin/tmux
#   jq: /opt/homebrew/bin/jq
#   claude: ~/.local/bin/claude
#   hs: /Applications/Hammerspoon.app/Contents/Frameworks/hs/hs

# Usage chart cost estimation parameters
chart:
  planMonthlyCost: 150       # Your plan's monthly cost in USD
  apiCostPerSessionPct: 0.20 # Estimated API cost per 1% of a 5h session window

# Multi-account usage monitoring (optional)
# Each account gets its own tmux session and JSONL log.
# The 'primary' account is displayed in the menubar title.
# accounts:
#   - name: Alice
#     token: sk-ant-oat01-...
#     primary: true
#   - name: Bob
#     token: sk-ant-oat01-...
